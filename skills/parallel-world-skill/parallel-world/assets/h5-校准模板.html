<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>【替换:方案标题】· 对答案校准</title>
<!--
  parallel-world H5 校准报告模板
  用法:复制本文件 → 按【替换:…】填充 → 存为 h5/校准-R-XXX.html
  逐人对照卡按画像数复制;「写入的记忆」只出现在被校准的人身上
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif;background:#F2F4F8;color:#333;line-height:1.7;font-size:15px}
  .wrap{max-width:480px;margin:0 auto;padding:20px 14px 40px}
  .badge{display:inline-block;background:#FFF3EA;color:#E8641E;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:1px}
  h1{font-size:21px;color:#1a1a1a;margin:12px 0 4px;line-height:1.4}
  .meta{color:#8A94A2;font-size:13px;margin-bottom:18px}
  .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,40,80,.06)}
  .card h2{font-size:15px;color:#E8641E;margin-bottom:10px;font-weight:700}
  .vs{display:flex;gap:10px}
  .vs>div{flex:1;border-radius:8px;padding:10px 12px;font-size:13px}
  .vs .pred{background:#EEF4FE;color:#1E4E9E}
  .vs .real{background:#FFF3EA;color:#8a4a1a}
  .vs b{display:block;font-size:12px;margin-bottom:4px;opacity:.7}
  .p-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0F2F5}
  .p-row:last-child{border-bottom:none}
  .avatar{width:34px;height:34px;border-radius:50%;background:#1E6FE8;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .p-name{font-weight:700;font-size:14px}
  .verdict{margin-left:auto;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;flex-shrink:0}
  .hit{background:#E8F6EE;color:#1E7B45}
  .miss{background:#FFF0EA;color:#C2411A}
  .quote{background:#F7F9FC;border-left:3px solid #E8641E;border-radius:6px;padding:10px 12px;margin-top:10px;font-size:14px;color:#444}
  .quote b{display:block;font-size:12px;color:#8A94A2;font-weight:600;margin-bottom:4px}
  .footer{text-align:center;color:#8A94A2;font-size:12px;margin-top:22px;line-height:2}
</style>
</head>
<body>
<div class="wrap">

  <span class="badge">平行世界 · 对答案</span>
  <h1>【替换:方案标题】</h1>
  <div class="meta">R-【替换:编号】校准 · 【替换:日期】</div>

  <div class="card">
    <h2>预测 vs 真实</h2>
    <div class="vs">
      <div class="pred"><b>推演预测</b>【替换:当时的核心预测】</div>
      <div class="real"><b>真实结果</b>【替换:实际发生了什么】</div>
    </div>
  </div>

  <div class="card">
    <h2>逐人对照</h2>
    <div class="p-row"><div class="avatar">【姓】</div><span class="p-name">【姓名】</span><span class="verdict hit">方向对了</span></div>
    <div class="p-row"><div class="avatar">【姓】</div><span class="p-name">【姓名】</span><span class="verdict miss">偏了</span></div>
    <p style="font-size:12px;color:#8A94A2;margin-top:8px">聚合结果到个人的对应为推断,依据:【替换:推断依据一句话】</p>
  </div>

  <div class="card">
    <h2>写入的记忆(只给偏了的人)</h2>
    <div class="quote"><b>【姓名】新增记忆</b>【替换:体感记忆原文——检验:不含任何数字】</div>
  </div>

  <div class="card">
    <h2>校准小结</h2>
    <p>【替换:这次误差在哪 / 画像库动了什么 / 下次推演预期改善什么】</p>
  </div>

  <div class="footer">
    由 parallel-world skill 生成<br>
    数字分身用户推演 · 作者 邱一尺(公众号同名)
  </div>

</div>
</body>
</html>
